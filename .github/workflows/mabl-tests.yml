name: Run mabl tests

on:

  push:

    branches: [ main ]

  pull_request:

    branches: [ main ]

jobs:

  mabl-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository

        uses: actions/checkout@v3

      - name: Install Node.js

        uses: actions/setup-node@v3

        with:

          node-version: 18

      - name: Install mabl CLI

        run: npm install -g @mablhq/mabl-cli

      - name: Authenticate mabl CLI

        run: mabl auth activate-key ${{ secrets.MABL_API_KEY }}

      - name: Execute specific mabl test

        run: mabl tests run --id y7D4mRvTJLZryYu8IZmPyQ-j -a CaKDmntpsouy6ULyOw7CgQ-a -e CaTSk6sBluIijdMfqSWe6A-e --headless
 