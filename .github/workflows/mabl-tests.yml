
name: Run mabl tests

on:

  push:

    branches: [ main ]

  pull_request:

    branches: [ main ]

jobs:

  mabl-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository

        uses: actions/checkout@v4

      - name: Run mabl tests

        uses: mablhq/github-run-tests-action@v1

        env:

          MABL_API_KEY: ${{ secrets.MABL_API_KEY }}

          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

        with:

          application-id: CaKDmntpsouy6ULyOw7CgQ-a

          environment-id: CaTSk6sBluIijdMfqSWe6A-e
 
 